<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Comments UI</title>
<style>
    body {
        margin: 0;
        padding: 40px;
        background: #0F1A4D;
        font-family: Arial, Helvetica, sans-serif;
        color: white;
    }

    .comment-box {
        display: flex;
        align-items: flex-start;
        margin: 35px 0;
    }

    .avatar {
        width: 70px;
        height: 70px;
        border-radius: 50%;
        margin-right: 25px;
        object-fit: cover;
    }

    .bubble {
        position: relative;
        background: rgba(110, 97, 203, 0.55);
        padding: 22px 28px;
        border-radius: 18px;
        width: 70%;
        font-size: 17px;
        line-height: 1.45;
    }

    /* 🔻 Tooltip Notch / Arrow */
    .bubble::before {
        content: "";
        position: absolute;
        left: -18px;
        top: 28px;
        width: 0;
        height: 0;
        border-top: 14px solid transparent;
        border-bottom: 14px solid transparent;
        border-right: 18px solid rgba(110, 97, 203, 0.55);
        border-radius: 6px;
    }

    .name { font-weight: bold; }
    .time { opacity: 0.8; }
    .text { margin-top: 6px; display: block; }
</style>
</head>
<body>

<!-- COMMENT 1 -->
<div class="comment-box">
    <img src="https://via.placeholder.com/70" class="avatar">
    <div class="bubble">
        <span class="name">Chris Curry</span>
        <span class="time"> - 1 Hour ago</span>
        <span class="text">
            whachikan Just noticed that someone categorized this as belonging to the genre "demons" LOL
        </span>
    </div>
</div>

<!-- COMMENT 2 -->
<div class="comment-box">
    <img src="https://via.placeholder.com/70" class="avatar">
    <div class="bubble">
        <span class="name">Lewis Mann</span>
        <span class="time"> - 5 Hour ago</span>
        <span class="text">
            Finally it came out ages ago
        </span>
    </div>
</div>
</body>
</html>
